# =============================================================================
# Fichier     : netplan-99-docker-host.yaml
# Description : Configuration Netplan statique de référence pour la VM Docker-Host
#               PFE IoT Security - Phase 1
#               Ce fichier reflète ce que setup-docker-host.sh génère dans
#               /etc/netplan/99-docker-host.yaml
# Version     : 2.0
# Auteur      : PFE IoT Security Team
# Date        : 2026-03-07
# =============================================================================

network:
  version: 2
  renderer: networkd
  ethernets:
    # Interface VMnet1 - parent macvlan VLAN10 IoT (sans IP directe)
    eth0:
      dhcp4: false
      dhcp6: false

    # Interface VMnet2 - parent macvlan VLAN20 SIEM (sans IP directe)
    eth1:
      dhcp4: false
      dhcp6: false

    # Interface VMnet3 - Management/PKI, IP fixe
    eth2:
      dhcp4: false
      dhcp6: false
      addresses:
        - 192.168.30.100/24
      routes:
        - to: 192.168.30.0/24
          via: 192.168.30.1
      nameservers:
        addresses: [8.8.8.8, 8.8.4.4]

    # Interface VMnet8 - NAT internet (DHCP)
    eth3:
      dhcp4: true
      dhcp6: false
