# =============================================================================
# Fichier     : mosquitto.conf
# Description : Configuration Mosquitto MQTT Broker - PFE IoT Security
#               Phase 2 : TLS activé sur port 8883 (mTLS)
# Version     : 2.0
# Auteur      : PFE IoT Security Team
# Date        : 2026-03-08
# =============================================================================

# --- Persistance ---
persistence true
persistence_location /mosquitto/data/

# --- Logging ---
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type all
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S

# --- Listener 1883 - MQTT non sécurisé (Phase 1, maintenu pour tests) ---
# ATTENTION : à désactiver en Phase 3
listener 1883
allow_anonymous true

# --- Listener 9001 - MQTT over WebSocket ---
listener 9001
protocol websockets
allow_anonymous true

# --- Listener 8883 - MQTT over TLS (activé Phase 2) ---
# Certificats générés par Vault PKI via pki/setup-pki.sh
listener 8883
certfile /mosquitto/certs/server.crt
keyfile /mosquitto/certs/server.key
cafile /mosquitto/certs/ca.crt
require_certificate true
use_identity_as_username true
allow_anonymous false

# --- Limites de connexion ---
max_connections 100
max_inflight_messages 20
max_queued_messages 100

# --- Messages retenus ---
retain_available true

# --- Keepalive ---
keepalive_interval 60
