# =============================================================================
# Fichier     : mosquitto.conf
# Description : Configuration Mosquitto MQTT Broker - PFE IoT Security
#               Phase 1 : configuration initiale sans TLS (TLS Phase 3)
# Version     : 1.0
# Auteur      : PFE IoT Security Team
# Date        : 2026-03-03
# =============================================================================

# -----------------------------------------------------------------------------
# Persistance des messages
# -----------------------------------------------------------------------------
persistence true
persistence_location /mosquitto/data/

# -----------------------------------------------------------------------------
# Logging
# -----------------------------------------------------------------------------
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type all
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S

# -----------------------------------------------------------------------------
# Listener 1883 - MQTT non sécurisé (pour tests initiaux Phase 1)
# ATTENTION : allow_anonymous sera désactivé en Phase 3 avec mTLS
# -----------------------------------------------------------------------------
listener 1883
allow_anonymous true

# -----------------------------------------------------------------------------
# Listener 9001 - MQTT over WebSocket (pour dashboards web)
# -----------------------------------------------------------------------------
listener 9001
protocol websockets
allow_anonymous true

# -----------------------------------------------------------------------------
# Listener 8883 - MQTT over TLS (à activer en Phase 3)
# Décommenter les lignes ci-dessous lors de l'activation du TLS
# -----------------------------------------------------------------------------
#listener 8883
#certfile /mosquitto/certs/server.crt
#keyfile /mosquitto/certs/server.key
#cafile /mosquitto/certs/ca.crt
#require_certificate true
#use_identity_as_username true
#allow_anonymous false

# -----------------------------------------------------------------------------
# Limites de connexion (sécurité de base)
# -----------------------------------------------------------------------------
max_connections 100
max_inflight_messages 20
max_queued_messages 100

# -----------------------------------------------------------------------------
# Configuration des messages retenus (retained)
# -----------------------------------------------------------------------------
retain_available true

# -----------------------------------------------------------------------------
# Keepalive
# -----------------------------------------------------------------------------
keepalive_interval 60
